name: Update Stats and Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # 每天凌晨2点运行
  push:
    branches: [ master ]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch GitHub and Juejin data
        run: node scripts/fetch-stats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JUEJIN_USER_ID: ${{ secrets.JUEJIN_USER_ID }}

      - name: Commit changes
        run: |
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git config --local user.name 'github-actions[bot]'
          git add assets/data/
          git diff --staged --quiet || git commit -m '[bot] update stats and articles'

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
